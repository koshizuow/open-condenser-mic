name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            kicad kicad-footprints kicad-symbols \
            ngspice python3-numpy python3-matplotlib git ca-certificates zip

      - name: Python syntax check
        run: |
          python3 -m py_compile \
            pcb/gen_project.py pcb/gen_schematic.py \
            pcb/gen_pcb.py pcb/gen_bom.py sim/plot_all.py

      - name: Generate KiCad files
        run: |
          python3 pcb/gen_project.py
          python3 pcb/gen_schematic.py
          python3 pcb/gen_pcb.py
          python3 pcb/gen_bom.py
          python3 pcb/gen_bom.py --hi-gain
          python3 pcb/gen_bom.py --presence
          python3 pcb/gen_bom.py --hi-gain --presence

      - name: Verify KiCad outputs exist
        run: |
          ls pcb/open-condenser-mic.kicad_pro
          ls pcb/open-condenser-mic.kicad_pcb
          ls pcb/open-condenser-mic.kicad_sch
          ls pcb/bom.csv pcb/cpl.csv
          ls pcb/bom-hi-gain.csv pcb/cpl-hi-gain.csv
          ls pcb/bom-presence.csv pcb/cpl-presence.csv
          ls pcb/bom-hi-gain-presence.csv pcb/cpl-hi-gain-presence.csv

      - name: PCB DRC report (all severities)
        if: always()
        run: kicad-cli pcb drc --severity-all --format report -o drc-report.rpt pcb/open-condenser-mic.kicad_pcb

      - name: PCB DRC gate (fail on errors only)
        run: kicad-cli pcb drc --severity-error --exit-code-violations pcb/open-condenser-mic.kicad_pcb

      - name: Schematic ERC report (all severities)
        if: always()
        run: kicad-cli sch erc --severity-all -o erc-report.rpt pcb/open-condenser-mic.kicad_sch

      - name: Schematic ERC gate (fail on errors only)
        run: kicad-cli sch erc --severity-error --exit-code-violations pcb/open-condenser-mic.kicad_sch

      - name: Write DRC/ERC summary
        if: always()
        run: |
          # Severity labels ("; error" / "; warning") in kicad-cli report output
          # stay in English regardless of locale, unlike the header/footer text,
          # so count violations that way rather than parsing localized strings.
          summarize() {
            local file="$1" label="$2"
            echo "### $label"
            if [ -f "$file" ]; then
              local total errors warnings
              total=$(grep -c "^\[" "$file" || true)
              errors=$(grep -c "; error" "$file" || true)
              warnings=$(grep -c "; warning" "$file" || true)
              echo ""
              echo "**$total violations** — $errors error(s), $warnings warning(s)"
              echo ""
              echo "<details><summary>Full report</summary>"
              echo ""
              echo '```'
              cat "$file"
              echo '```'
              echo "</details>"
            else
              echo ""
              echo "_${file} not generated (an earlier step likely failed)_"
            fi
            echo ""
          }
          {
            echo "## DRC / ERC results"
            echo ""
            summarize drc-report.rpt "PCB DRC"
            summarize erc-report.rpt "Schematic ERC"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Export schematic PDF
        run: |
          mkdir -p docs
          kicad-cli sch export pdf --black-and-white \
            --output docs/schematic.pdf \
            pcb/open-condenser-mic.kicad_sch

      - name: Verify schematic PDF exists
        run: ls docs/schematic.pdf

      - name: Export Gerbers + drill files
        run: |
          mkdir -p fab/gerbers
          kicad-cli pcb export gerbers --output fab/gerbers/ pcb/open-condenser-mic.kicad_pcb
          kicad-cli pcb export drill --output fab/gerbers/ pcb/open-condenser-mic.kicad_pcb
          (cd fab/gerbers && zip -j ../gerbers.zip *)
          rm -rf fab/gerbers
          cp pcb/bom.csv pcb/cpl.csv fab/

      - name: Generate SPICE params
        run: python3 pcb/gen_params.py

      - name: Run SPICE simulations
        working-directory: sim
        run: |
          ngspice -b boost_dickson.sp
          ngspice -b amp_ac.sp
          ngspice -b amp_bias_compare.sp
          ngspice -b amp_noise_opa1641.sp

      - name: Generate plots
        run: python3 sim/plot_all.py

      - name: Verify plot outputs exist
        run: |
          ls img/hv_startup.png
          ls img/noise_spectrum.png
          ls img/freq_response.png

      - name: Upload fabrication outputs
        uses: actions/upload-artifact@v7
        with:
          name: fabrication-outputs
          path: fab/

      - name: Upload BOM variants
        uses: actions/upload-artifact@v7
        with:
          name: bom-variants
          path: |
            pcb/bom-hi-gain.csv
            pcb/cpl-hi-gain.csv
            pcb/bom-presence.csv
            pcb/cpl-presence.csv
            pcb/bom-hi-gain-presence.csv
            pcb/cpl-hi-gain-presence.csv

      - name: Upload schematic PDF
        uses: actions/upload-artifact@v7
        with:
          name: schematic
          path: docs/schematic.pdf

      - name: Upload KiCad project files
        uses: actions/upload-artifact@v7
        with:
          name: kicad-project
          path: |
            pcb/open-condenser-mic.kicad_pro
            pcb/open-condenser-mic.kicad_sch
            pcb/open-condenser-mic.kicad_pcb

      - name: Upload DRC/ERC reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: drc-erc-reports
          path: |
            drc-report.rpt
            erc-report.rpt
